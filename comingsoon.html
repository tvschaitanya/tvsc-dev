<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Coming Soon</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fafafa;
                font-family: "Inter", "Segoe UI", sans-serif;
                color: #111;
            }
            .container {
                text-align: center;
                max-width: 480px;
                padding: 0 24px;
            }
            .icon {
                width: 56px;
                height: 56px;
                margin: 0 auto 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid #e5e5e5;
                border-radius: 50%;
            }
            .icon svg {
                width: 22px;
                height: 22px;
                stroke: #111;
                stroke-width: 1.5;
            }
            h1 {
                font-size: 2rem;
                font-weight: 500;
                letter-spacing: -0.5px;
                color: #111;
            }
            p {
                margin-top: 12px;
                color: #888;
                font-size: 0.95rem;
                font-weight: 400;
                line-height: 1.5;
            }
            .line {
                width: 40px;
                height: 1px;
                background: #ddd;
                margin: 28px auto;
            }
            .dots {
                display: flex;
                justify-content: center;
                gap: 6px;
            }
            .dots span {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: #ccc;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="icon">
                <i data-lucide="hourglass"></i>
            </div>
            <h1>Coming Soon</h1>
            <p>We're crafting something worth the wait.</p>
            <p>Portfolio · Blog · Projects</p>
            <br/>
            <div class="dots"><span></span><span></span><span></span></div>
        </div>

        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script>
            lucide.createIcons();

            gsap.from(".icon", {
                opacity: 0,
                scale: 0.8,
                duration: 0.8,
                ease: "power2.out",
            });
            gsap.from("h1", { y: 12, opacity: 0, duration: 0.8, delay: 0.2 });
            gsap.from("p", { y: 12, opacity: 0, duration: 0.8, delay: 0.35 });
            gsap.from(".line", { scaleX: 0, duration: 0.6, delay: 0.5 });
            gsap.from(".dots span", {
                opacity: 0,
                duration: 0.5,
                delay: 0.6,
                stagger: 0.1,
            });

            gsap.to(".dots span", {
                y: -6,
                stagger: { each: 0.15, repeat: -1, yoyo: true },
                duration: 0.5,
                ease: "sine.inOut",
            });

            gsap.to(".icon", {
                rotate: 15,
                repeat: -1,
                yoyo: true,
                duration: 2,
                ease: "sine.inOut",
            });
        </script>
    </body>
</html>
